<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard — {{ shop_name }}</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#000;--bg2:#0a0a0a;--bg3:#111;--bg4:#1a1a1a;
  --text:#f5f5f7;--text2:#a1a1a6;--text3:#6e6e73;
  --accent:#f5a623;--accent2:#ff6b35;
  --green:#30d158;--red:#ff453a;--blue:#2997ff;--orange:#ff9f0a;
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.15);
  --radius:16px;--radius-sm:10px;--radius-xs:8px;
  --font:-apple-system,BlinkMacSystemFont,'Inter','Helvetica Neue',sans-serif;
}
html{-webkit-font-smoothing:antialiased}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh}

/* Nav */
nav{position:sticky;top:0;z-index:100;padding:0 20px;height:56px;display:flex;align-items:center;justify-content:space-between;background:rgba(0,0,0,0.85);backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px);border-bottom:1px solid var(--border)}
.nav-left{display:flex;align-items:center;gap:12px}
.nav-logo{font-size:17px;font-weight:600}
.nav-logo span{color:var(--accent)}
.nav-badge{background:var(--bg4);border:1px solid var(--border);border-radius:20px;padding:4px 12px;font-size:12px;color:var(--text3);font-weight:500}
.nav-right{display:flex;align-items:center;gap:12px}
.nav-btn{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-xs);padding:8px 14px;font-size:13px;color:var(--text2);cursor:pointer;font-family:var(--font);transition:all .2s;text-decoration:none;display:inline-flex;align-items:center;gap:6px}
.nav-btn:hover{border-color:var(--border2);color:var(--text)}
.nav-btn.danger:hover{border-color:rgba(255,69,58,0.3);color:var(--red)}

/* Dashboard */
.dashboard{padding:24px 20px 60px;max-width:1200px;margin:0 auto}

/* Stats */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:28px}
@media(max-width:700px){.stats{grid-template-columns:repeat(2,1fr)}}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:20px;transition:all .3s}
.stat-card:hover{border-color:var(--border2)}
.stat-card .stat-label{font-size:12px;color:var(--text3);font-weight:500;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px}
.stat-card .stat-value{font-size:28px;font-weight:700;letter-spacing:-0.03em}
.stat-card .stat-sub{font-size:12px;color:var(--text3);margin-top:4px}
.stat-card.paid-stat .stat-value{color:var(--green)}
.stat-card.pending-stat .stat-value{color:var(--orange)}
.stat-card.total-stat .stat-value{color:var(--accent)}
.stat-card.revenue-stat .stat-value{color:var(--blue)}

/* Filters */
.filters{display:flex;align-items:center;gap:10px;margin-bottom:20px;flex-wrap:wrap}
.filter-btn{background:var(--bg3);border:1px solid var(--border);border-radius:20px;padding:8px 16px;font-size:13px;color:var(--text2);cursor:pointer;font-family:var(--font);transition:all .2s;font-weight:500}
.filter-btn:hover{border-color:var(--border2);color:var(--text)}
.filter-btn.active{background:var(--accent);color:#000;border-color:var(--accent);font-weight:600}

/* Orders */
.orders-list{display:flex;flex-direction:column;gap:12px}
.order-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:20px 24px;transition:all .3s;animation:fadeUp .4s ease both}
.order-card:hover{border-color:var(--border2)}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

.order-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px}
.order-id-badge{display:inline-flex;align-items:center;gap:6px;background:var(--bg4);border-radius:6px;padding:5px 12px;font-size:13px;font-weight:700;letter-spacing:0.5px;font-family:'SF Mono',SFMono-Regular,monospace}
.order-time{font-size:12px;color:var(--text3)}

.status-badge{display:inline-flex;align-items:center;gap:5px;padding:5px 14px;border-radius:20px;font-size:12px;font-weight:600;letter-spacing:0.3px}
.status-badge.pending{background:rgba(255,159,10,0.12);color:var(--orange);border:1px solid rgba(255,159,10,0.25)}
.status-badge.paid{background:rgba(48,209,88,0.12);color:var(--green);border:1px solid rgba(48,209,88,0.25)}
.status-badge.printed{background:rgba(41,151,255,0.12);color:var(--blue);border:1px solid rgba(41,151,255,0.25)}
.status-badge.delivered{background:rgba(161,161,166,0.12);color:var(--text2);border:1px solid rgba(161,161,166,0.2)}
.status-dot{width:6px;height:6px;border-radius:50%;background:currentColor}

.order-body{display:grid;grid-template-columns:1fr auto;gap:16px;align-items:start}
@media(max-width:600px){.order-body{grid-template-columns:1fr}}
.order-details{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px 16px}
.detail-item{font-size:13px}
.detail-item .dl{color:var(--text3);font-weight:500}
.detail-item .dv{color:var(--text);font-weight:600;margin-top:1px;word-break:break-all}
.detail-item .dv.amount{color:var(--accent);font-size:16px;font-weight:700}

.order-actions{display:flex;flex-direction:column;gap:6px;min-width:130px}
@media(max-width:600px){.order-actions{flex-direction:row;flex-wrap:wrap;min-width:auto}}

.action-btn{padding:8px 14px;border-radius:var(--radius-xs);border:1px solid var(--border);background:var(--bg3);color:var(--text2);font-size:12px;font-weight:600;cursor:pointer;font-family:var(--font);transition:all .2s;text-align:center;white-space:nowrap}
.action-btn:hover{border-color:var(--border2);color:var(--text);transform:translateY(-1px)}
.action-btn:active{transform:scale(0.97)}
.action-btn.download{color:var(--blue);border-color:rgba(41,151,255,0.2)}
.action-btn.download:hover{background:rgba(41,151,255,0.08);border-color:rgba(41,151,255,0.3)}
.action-btn.pay{color:var(--green);border-color:rgba(48,209,88,0.2)}
.action-btn.pay:hover{background:rgba(48,209,88,0.08);border-color:rgba(48,209,88,0.3)}
.action-btn.print{color:var(--blue);border-color:rgba(41,151,255,0.2)}
.action-btn.print:hover{background:rgba(41,151,255,0.08);border-color:rgba(41,151,255,0.3)}
.action-btn.deliver{color:var(--accent);border-color:rgba(245,166,35,0.2)}
.action-btn.deliver:hover{background:rgba(245,166,35,0.08);border-color:rgba(245,166,35,0.3)}
.action-btn.delete{color:var(--red);border-color:rgba(255,69,58,0.15)}
.action-btn.delete:hover{background:rgba(255,69,58,0.08);border-color:rgba(255,69,58,0.3)}

/* UPI Info */
.upi-info{font-size:11px;color:var(--text3);margin-top:4px;display:flex;align-items:center;gap:4px}

/* Empty state */
.empty-state{text-align:center;padding:80px 20px;color:var(--text3)}
.empty-state .icon{font-size:48px;margin-bottom:16px;opacity:0.5}
.empty-state h3{font-size:18px;color:var(--text2);margin-bottom:6px;font-weight:600}
.empty-state p{font-size:14px}

/* Toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(100px);background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius-sm);padding:12px 20px;font-size:14px;color:var(--text);z-index:9999;transition:transform .4s cubic-bezier(0.16,1,0.3,1);box-shadow:0 8px 30px rgba(0,0,0,0.5);display:flex;align-items:center;gap:8px}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.success{border-color:rgba(48,209,88,0.3)}
.toast.error{border-color:rgba(255,69,58,0.3)}

/* Sound toggle */
.sound-toggle{position:fixed;bottom:20px;right:20px;z-index:998;background:var(--bg3);border:1px solid var(--border);border-radius:50%;width:40px;height:40px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;transition:all .2s}
.sound-toggle:hover{border-color:var(--border2)}
</style>
</head>
<body>

<nav>
  <div class="nav-left">
    <div class="nav-logo">🦇 <span>{{ shop_name }}</span></div>
    <div class="nav-badge" id="orderCount">{{ orders|length }} orders</div>
  </div>
  <div class="nav-right">
    <a href="/" class="nav-btn" target="_blank">View Shop ↗</a>
    <a href="/admin/logout" class="nav-btn danger">Logout</a>
  </div>
</nav>

<div class="dashboard">
  <!-- Stats -->
  <div class="stats" id="statsBar">
    <!-- Filled by JS -->
  </div>

  <!-- Filters -->
  <div class="filters" id="filtersBar">
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="pending">⏳ Pending Payment</button>
    <button class="filter-btn" data-filter="paid">✅ Paid</button>
    <button class="filter-btn" data-filter="printed">🖨️ Printed</button>
    <button class="filter-btn" data-filter="delivered">📦 Delivered</button>
  </div>

  <!-- Orders -->
  <div class="orders-list" id="ordersList">
    <!-- Filled by JS -->
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Notification sound -->
<audio id="notifSound" preload="auto">
  <source src="data:audio/wav;base64,UklGRnoGAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQoGAACBhYqFbF1fdJivrJBhNjVgipuzs2Y3NZeLpbK5t2k2N1eKpLC5t2k2N1eKpLC5t2g=" type="audio/wav">
</audio>

<script>
// Orders data from server
const orders = {{ orders | tojson }};
let currentFilter = 'all';

function getStats() {
  const total = orders.length;
  const pending = orders.filter(o => o.status === 'pending').length;
  const paid = orders.filter(o => o.status === 'paid').length;
  const printed = orders.filter(o => o.status === 'printed').length;
  const delivered = orders.filter(o => o.status === 'delivered').length;
  const revenue = orders.filter(o => o.status !== 'pending').reduce((s, o) => s + o.amount, 0);
  return { total, pending, paid, printed, delivered, revenue };
}

function renderStats() {
  const s = getStats();
  document.getElementById('statsBar').innerHTML = `
    <div class="stat-card total-stat">
      <div class="stat-label">Total Orders</div>
      <div class="stat-value">${s.total}</div>
      <div class="stat-sub">${s.pending} awaiting payment</div>
    </div>
    <div class="stat-card paid-stat">
      <div class="stat-label">Paid</div>
      <div class="stat-value">${s.paid}</div>
      <div class="stat-sub">${s.printed} printed</div>
    </div>
    <div class="stat-card pending-stat">
      <div class="stat-label">Pending</div>
      <div class="stat-value">${s.pending}</div>
      <div class="stat-sub">Need verification</div>
    </div>
    <div class="stat-card revenue-stat">
      <div class="stat-label">Revenue</div>
      <div class="stat-value">₹${s.revenue.toFixed(0)}</div>
      <div class="stat-sub">${s.delivered} delivered</div>
    </div>
  `;
  document.getElementById('orderCount').textContent = s.total + ' orders';
}

function getNextAction(status) {
  switch(status) {
    case 'pending': return { label: '✓ Mark Paid', action: 'paid', cls: 'pay' };
    case 'paid': return { label: '🖨 Mark Printed', action: 'printed', cls: 'print' };
    case 'printed': return { label: '📦 Mark Delivered', action: 'delivered', cls: 'deliver' };
    default: return null;
  }
}

function formatTime(iso) {
  const d = new Date(iso);
  const now = new Date();
  const diff = now - d;
  if (diff < 60000) return 'Just now';
  if (diff < 3600000) return Math.floor(diff/60000) + 'm ago';
  if (diff < 86400000) return Math.floor(diff/3600000) + 'h ago';
  return d.toLocaleDateString('en-IN', { day:'numeric', month:'short', hour:'2-digit', minute:'2-digit' });
}

function renderOrders() {
  const list = document.getElementById('ordersList');
  let filtered = currentFilter === 'all' ? orders : orders.filter(o => o.status === currentFilter);

  if (filtered.length === 0) {
    list.innerHTML = `
      <div class="empty-state">
        <div class="icon">📭</div>
        <h3>No orders here</h3>
        <p>${currentFilter === 'all' ? 'Orders will appear here when students place them.' : 'No ' + currentFilter + ' orders right now.'}</p>
      </div>
    `;
    return;
  }

  list.innerHTML = filtered.map((o, i) => {
    const next = getNextAction(o.status);
    const actions = [];

    actions.push(`<a href="/admin/download/${o.id}" class="action-btn download">⬇ Download</a>`);
    if (next) {
      actions.push(`<button class="action-btn ${next.cls}" onclick="updateStatus('${o.id}','${next.action}')">${next.label}</button>`);
    }
    actions.push(`<button class="action-btn delete" onclick="deleteOrder('${o.id}')">🗑 Delete</button>`);

    return `
      <div class="order-card" style="animation-delay:${i * 0.05}s">
        <div class="order-header">
          <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
            <span class="order-id-badge">#${o.id}</span>
            <span class="status-badge ${o.status}"><span class="status-dot"></span>${o.status.charAt(0).toUpperCase() + o.status.slice(1)}</span>
            ${o.payment_method ? `<span class="upi-info">💳 ${o.payment_method.toUpperCase()}</span>` : ''}
          </div>
          <span class="order-time">${formatTime(o.created_at)}</span>
        </div>
        <div class="order-body">
          <div class="order-details">
            <div class="detail-item">
              <div class="dl">Name</div>
              <div class="dv">${o.student_name}</div>
            </div>
            <div class="detail-item">
              <div class="dl">Phone</div>
              <div class="dv">${o.phone}</div>
            </div>
            <div class="detail-item">
              <div class="dl">File</div>
              <div class="dv">${o.original_filename}</div>
            </div>
            <div class="detail-item">
              <div class="dl">Type</div>
              <div class="dv">${o.print_type === 'color' ? '🎨 Color' : '⬛ B&W'}</div>
            </div>
            <div class="detail-item">
              <div class="dl">Pages × Copies</div>
              <div class="dv">${o.pages} × ${o.copies}</div>
            </div>
            <div class="detail-item">
              <div class="dl">Amount</div>
              <div class="dv amount">₹${o.amount.toFixed(0)}</div>
            </div>
            ${o.notes ? `
            <div class="detail-item" style="grid-column:1/-1">
              <div class="dl">Notes</div>
              <div class="dv">${o.notes}</div>
            </div>` : ''}
          </div>
          <div class="order-actions">
            ${actions.join('')}
          </div>
        </div>
      </div>
    `;
  }).join('');
}

// Update status
async function updateStatus(orderId, newStatus) {
  try {
    const res = await fetch(`/admin/status/${orderId}/${newStatus}`, { method: 'POST' });
    const data = await res.json();
    if (data.success) {
      const order = orders.find(o => o.id === orderId);
      if (order) order.status = newStatus;
      renderStats();
      renderOrders();
      showToast(`Order #${orderId} marked as ${newStatus}`, 'success');
      playNotif();
    }
  } catch(e) {
    showToast('Error updating status', 'error');
  }
}

// Delete order
async function deleteOrder(orderId) {
  if (!confirm(`Delete order #${orderId}? This cannot be undone.`)) return;
  try {
    const res = await fetch(`/admin/delete/${orderId}`, { method: 'POST' });
    const data = await res.json();
    if (data.success) {
      const idx = orders.findIndex(o => o.id === orderId);
      if (idx > -1) orders.splice(idx, 1);
      renderStats();
      renderOrders();
      showToast(`Order #${orderId} deleted`, 'success');
    }
  } catch(e) {
    showToast('Error deleting order', 'error');
  }
}

// Toast
function showToast(msg, type) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.className = 'toast ' + type + ' show';
  setTimeout(() => toast.classList.remove('show'), 3000);
}

// Play notification sound
function playNotif() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.frequency.setValueAtTime(880, ctx.currentTime);
    osc.frequency.setValueAtTime(1100, ctx.currentTime + 0.1);
    gain.gain.setValueAtTime(0.1, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + 0.3);
  } catch(e) {}
}

// Filters
document.getElementById('filtersBar').addEventListener('click', (e) => {
  if (e.target.classList.contains('filter-btn')) {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    e.target.classList.add('active');
    currentFilter = e.target.dataset.filter;
    renderOrders();
  }
});

// Auto-refresh every 5 seconds
let lastOrderCount = orders.length;
setInterval(async () => {
  try {
    const res = await fetch('/admin');
    // We can't easily parse HTML, so we just rely on manual refresh
    // But we can check if there's a way... Actually let's just note the user
  } catch(e) {}
}, 30000);

// Initial render
renderStats();
renderOrders();

// Keyboard shortcut: R to refresh
document.addEventListener('keydown', (e) => {
  if (e.key === 'r' && !e.ctrlKey && !e.metaKey && e.target.tagName !== 'INPUT') {
    window.location.reload();
  }
});
</script>
</body>
</html>
