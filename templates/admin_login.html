<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login — {{ shop_name }}</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#000;--bg2:#0a0a0a;--bg3:#111;
  --text:#f5f5f7;--text2:#a1a1a6;--text3:#6e6e73;
  --accent:#f5a623;--red:#ff453a;
  --border:rgba(255,255,255,0.08);
  --radius:16px;--radius-xs:8px;
  --font:-apple-system,BlinkMacSystemFont,'Inter','Helvetica Neue',sans-serif;
}
html{-webkit-font-smoothing:antialiased}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}

.login-box{width:100%;max-width:380px;animation:fadeUp .6s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

.login-logo{text-align:center;margin-bottom:36px}
.login-logo .icon{font-size:48px;margin-bottom:12px}
.login-logo h1{font-size:24px;font-weight:700;letter-spacing:-0.03em}
.login-logo p{font-size:14px;color:var(--text3);margin-top:4px}

.login-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:32px 28px}

.form-group{margin-bottom:20px}
.form-group label{display:block;font-size:13px;font-weight:600;color:var(--text2);margin-bottom:8px;letter-spacing:0.2px;text-transform:uppercase}
.form-group input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-xs);padding:14px 16px;font-size:16px;color:var(--text);font-family:var(--font);transition:all .25s ease;outline:none}
.form-group input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(245,166,35,0.15)}

.login-btn{width:100%;background:var(--accent);color:#000;font-size:16px;font-weight:600;padding:14px 32px;border-radius:980px;border:none;cursor:pointer;transition:all .3s ease;font-family:var(--font)}
.login-btn:hover{transform:scale(1.02);box-shadow:0 0 30px rgba(245,166,35,0.25)}
.login-btn:active{transform:scale(0.98)}

.error-msg{background:rgba(255,69,58,0.12);border:1px solid rgba(255,69,58,0.25);color:var(--red);font-size:13px;font-weight:500;padding:10px 14px;border-radius:var(--radius-xs);margin-bottom:16px;text-align:center}

.back-link{display:block;text-align:center;margin-top:20px;font-size:13px;color:var(--text3);text-decoration:none}
.back-link:hover{color:var(--text2)}
</style>
</head>
<body>

<div class="login-box">
  <div class="login-logo">
    <div class="icon">🦇</div>
    <h1>{{ shop_name }}</h1>
    <p>Shop Owner Login</p>
  </div>

  <div class="login-card">
    {% with messages = get_flashed_messages(category_filter=["error"]) %}
    {% if messages %}
      {% for msg in messages %}
      <div class="error-msg">{{ msg }}</div>
      {% endfor %}
    {% endif %}
    {% endwith %}

    <form method="POST">
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="Enter admin password" required autofocus>
      </div>
      <button type="submit" class="login-btn">Sign In</button>
    </form>
  </div>

  <a href="/" class="back-link">← Back to shop</a>
</div>

</body>
</html>
